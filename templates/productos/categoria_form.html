{% extends 'base.html' %}

{% block title %}{{ titulo }} — Gestión de Productos{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">

        <div class="d-flex align-items-center mb-4">
            <a href="{% url 'categoria_lista' %}" class="btn btn-outline-secondary btn-sm me-3">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h2 class="fw-bold mb-0">
                <i class="bi bi-tags me-2 text-primary"></i>{{ titulo }}
            </h2>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="post" novalidate>
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="{{ form.nombre.id_for_label }}" class="form-label fw-semibold">
                            Nombre <span class="text-danger">*</span>
                        </label>
                        {{ form.nombre }}
                        {% if form.nombre.errors %}
                            <div class="text-danger small mt-1">{{ form.nombre.errors.0 }}</div>
                        {% endif %}
                    </div>

                    <div class="mb-4">
                        <label for="{{ form.descripcion.id_for_label }}" class="form-label fw-semibold">
                            Descripción
                        </label>
                        {{ form.descripcion }}
                    </div>

                    <div class="d-flex gap-2 justify-content-end">
                        <a href="{% url 'categoria_lista' %}" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>{{ accion }}
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}
