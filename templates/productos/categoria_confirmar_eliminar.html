{% extends 'base.html' %}

{% block title %}Eliminar Categoría — Gestión de Productos{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm border-top border-danger border-3">
            <div class="card-body p-4 text-center">
                <div class="mb-3">
                    <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:3rem;"></i>
                </div>
                <h4 class="fw-bold">¿Eliminar categoría?</h4>
                <p class="text-muted">
                    Estás por eliminar la categoría <strong>{{ categoria.nombre }}</strong>.
                    Los productos asociados quedarán sin categoría.
                </p>

                <form method="post" class="d-flex gap-2 justify-content-center">
                    {% csrf_token %}
                    <a href="{% url 'categoria_lista' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg me-1"></i>Cancelar
                    </a>
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-1"></i>Sí, eliminar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
